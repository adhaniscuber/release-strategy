# ============================================================
# release.yml — Release Deployment
# Trigger : dipanggil oleh create-release.yml (workflow_dispatch)
# Deploy  : main           → dev + staging only (no prod)
#           release/v*.*.x → dev + staging + production
#           hotfix          → langsung production saja
# ============================================================
name: Release Deployment

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag yang akan di-deploy (contoh: v1.5.0)"
        required: true
        type: string
      branch:
        description: "Source branch (main atau release/v*.*.x)"
        required: false
        default: "main"
        type: string
      release_type:
        description: "Tipe release"
        required: false
        default: "regular"
        type: choice
        options:
          - regular
          - hotfix

jobs:
  deploy-dev:
    name: Deploy → Development
    if: inputs.release_type == 'regular'
    uses: ./.github/workflows/deploy.yml
    with:
      environment: development
      ref: ${{ inputs.tag }}

  deploy-staging:
    name: Deploy → Staging
    needs: deploy-dev
    if: always() && inputs.release_type == 'regular' && needs.deploy-dev.result == 'success'
    uses: ./.github/workflows/deploy.yml
    with:
      environment: staging
      ref: ${{ inputs.tag }}
    # Approval: any engineer
    # → Settings > Environments > staging > Required reviewers

  deploy-production:
    name: Deploy → Production
    needs: [deploy-dev, deploy-staging]
    if: |
      always() &&
      inputs.branch != 'main' &&
      (needs.deploy-dev.result == 'success' || needs.deploy-dev.result == 'skipped') &&
      (needs.deploy-staging.result == 'success' || needs.deploy-staging.result == 'skipped')
    uses: ./.github/workflows/deploy.yml
    with:
      environment: production
      ref: ${{ inputs.tag }}
    # Approval: specific user (tech lead / cto)
    # → Settings > Environments > production > Required reviewers
    #   Wait timer: 5 minutes (opsional)
